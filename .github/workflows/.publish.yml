name: Publish Python package and Docker images

on:
  push:
    tags:
      - '*'
env:
  GITHUB_REGISTRY: ghcr.io
  GITHUB_IMAGE_NAME: ${{ github.repository }}

jobs:
  build_package:
    if: github.repository == 'SamR1/FitTrackee' && startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/.workflow-build.yml
    with:
      retention-days: 5

  end2end_package:
    if: github.repository == 'SamR1/FitTrackee' && startsWith(github.ref, 'refs/tags/v')
    name: e2e tests with package
    needs: ["build_package"]
    uses: ./.github/workflows/.workflow-e2e.yml

  end2end_package_update:
    if: github.repository == 'SamR1/FitTrackee' && startsWith(github.ref, 'refs/tags/v')
    name: e2e tests after FitTrackee update
    needs: ["build_package"]
    uses: ./.github/workflows/.workflow-e2e.yml
    with:
      previous-version: true

  publish-to-pypi:
    if: github.repository == 'SamR1/FitTrackee' && startsWith(github.ref, 'refs/tags/v')
    name: Publish Python distribution to PyPI
    needs: ["end2end_package", "end2end_package_update"]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fittrackee
    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    if: github.repository == 'SamR1/FitTrackee' && startsWith(github.ref, 'refs/tags/v')
    name: Upload distribution to GitHub Release
    needs: ["publish-to-pypi"]
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: python-package-distributions
        path: dist/

    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl

    - name: Create GitHub draft release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        "$GITHUB_REF_NAME"
        --repo "$GITHUB_REPOSITORY"
        --draft
        --notes "wip"

    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release upload
        "$GITHUB_REF_NAME" dist/**
        --repo "$GITHUB_REPOSITORY"

  push_to_registries:
    if: github.repository == 'SamR1/FitTrackee' && startsWith(github.ref, 'refs/tags/v')
    name: Push Docker image to multiple registries
    needs: ["end2end_package", "end2end_package_update"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            fittrackee/fittrackee
            ${{ env.GITHUB_REGISTRY }}/${{ env.GITHUB_IMAGE_NAME}}
          tags: |
            type=pep440,pattern={{version}},prefix=v

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.GITHUB_REGISTRY }}/${{ env.GITHUB_IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
