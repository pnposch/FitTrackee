name: Docker Image CI

on:
  push:
    branches: [main, dev]
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Private Registry
        uses: docker/login-action@v4
        with:
          registry: repo.dev.posch.org
          username: docker2
          password: ${{ secrets.REPO_PWD }}

      - name: Determine image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "repo.dev.posch.org/${{ github.repository }}:latest"
            echo "repo.dev.posch.org/${{ github.repository }}:${{ github.sha }}"
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              echo "repo.dev.posch.org/${{ github.repository }}:${{ github.ref_name }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
